specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Envestnet
providerId: envestnet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Open Banking
  - Account Aggregation
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps view for Envestnet | Yodlee. Yodlee bills FIs and FinTechs under enterprise
  subscription contracts, typically combining product subscriptions with usage components such as connected
  end-users, account refreshes, and verification calls. List pricing is not published; FinOps tracks contracted
  fees and per-product usage against the customer agreement.
notes: List prices are not published on developer.envestnet.com. Reconcile FinOps against the executed
  Yodlee agreement and the per-product usage statements provided to the customer.
sources:
  - https://www.envestnet.com/
  - https://developer.envestnet.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Envestnet, Inc.
serviceCategory: Financial Data / Open Banking
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Envestnet | Yodlee APIs
  ServiceCategory: Financial Data / Open Banking
  ProviderName: Envestnet
  PublisherName: Envestnet, Inc.
  InvoiceIssuerName: Envestnet, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: connected_end_users
    unit: user-month
    aggregation: max
    dimensions:
      - product
      - customer
  - name: account_refreshes
    unit: refresh
    aggregation: sum
    dimensions:
      - product
      - data_source
      - customer
  - name: verification_calls
    unit: call
    aggregation: sum
    dimensions:
      - verification_type
      - customer
  - name: credit_accelerator_files
    unit: file
    aggregation: sum
    dimensions:
      - customer
  - name: insights_calls
    unit: call
    aggregation: sum
    dimensions:
      - product
      - customer
  - name: subscription_fee
    unit: month
    aggregation: sum
    dimensions:
      - product
      - customer
principles:
  - name: Visibility
    description: Track per-product usage (aggregation, verification, token, credit, insights, views) against
      the contract and reconcile to monthly Yodlee usage statements.
  - name: Allocation
    description: Allocate spend by FinTech product line, end-user cohort, and Yodlee product family.
  - name: Optimization
    description: Optimization levers include refresh-cadence tuning, deduplicated aggregation across products,
      and selective verification (not every aggregation flow needs a verification call).
  - name: Accountability
    description: The FI/FinTech product owner reconciles spend against the Yodlee agreement and engages
      Envestnet account management for renewal and tier changes.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
