specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Envestnet
providerId: envestnet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Wealth Management
  - Open Banking
  - Account Aggregation
description: Envestnet (Yodlee) sells its account-aggregation, verification, credit, insights, and personalized-view
  APIs to financial institutions and FinTech customers under direct enterprise agreements. The Yodlee
  developer portal advertises capabilities and exposes a sandbox but does not publish per-call or per-seat
  list pricing — pricing is set by sales contract.
notes: As of 2026-05-05 the Envestnet developer portal at developer.envestnet.com publishes product capabilities,
  documentation, and sandbox access but no list pricing. Plan terms are negotiated with the Envestnet
  | Yodlee sales team.
sources:
  - https://www.envestnet.com/
  - https://developer.envestnet.com/
  - https://developer.envestnet.com/contact-us
plans:
  - id: envestnet-yodlee-sandbox
    name: Yodlee Sandbox / Developer Access
    type: freemium
    description: Sandbox access for FIs and FinTechs to evaluate the Yodlee APIs (account aggregation,
      verification, account token, credit accelerator, insights, personalized views). Sandbox is for development
      and testing only; production access requires a signed agreement.
    entries:
      - label: Sandbox API Access
        name: sandbox_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Sandbox Endpoints
      - name: Documentation
      - name: Test Data Sets
      - name: Envestnet Account Aggregation API
      - name: Envestnet Account Token APIs
      - name: Envestnet Account Verification APIs
      - name: Envestnet Credit Accelerator API
      - name: Envestnet Insights API
      - name: Envestnet Personalized View API
  - id: envestnet-yodlee-enterprise
    name: Yodlee Enterprise Production
    type: enterprise
    description: Production access for FIs and FinTechs under an executed Envestnet | Yodlee agreement.
      Pricing is custom and typically based on a combination of seats / end-users / API call volume / product
      mix; not published publicly.
    entries:
      - label: Production API Access
        name: production_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Account Aggregation
      - name: Account Verification
      - name: Account Token
      - name: Credit Accelerator
      - name: Financial Insights
      - name: Personalized Views
      - name: SLA & Support
      - name: Envestnet Account Aggregation API
      - name: Envestnet Account Token APIs
      - name: Envestnet Account Verification APIs
      - name: Envestnet Credit Accelerator API
      - name: Envestnet Insights API
      - name: Envestnet Personalized View API
maintainers:
