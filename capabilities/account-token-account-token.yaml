naftiko: 1.0.0-alpha2
info:
  label: Envestnet Account Token APIs — Account Token
  description: 'Envestnet Account Token APIs — Account Token. 2 operations. Lead operation: Envestnet Create Account Token.
    Self-contained Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - Account Token
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-token-account-token
    baseUri: ''
    description: Envestnet Account Token APIs — Account Token business capability. Self-contained, no shared references.
    resources:
    - name: paymentProcessor-token
      path: /paymentProcessor/token
      operations:
      - name: generatepaymentprocessortoken
        method: POST
        description: Envestnet Create Account Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: revokepaymentprocessortoken
        method: DELETE
        description: Envestnet Delete Account Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: processorToken
          in: header
          type: string
          description: The token that you want to delete.
          required: true
  exposes:
  - type: rest
    namespace: account-token-account-token-rest
    port: 8080
    description: REST adapter for Envestnet Account Token APIs — Account Token. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/paymentprocessor/token
      name: paymentprocessor-token
      description: REST surface for paymentProcessor-token.
      operations:
      - method: POST
        name: generatepaymentprocessortoken
        description: Envestnet Create Account Token
        call: account-token-account-token.generatepaymentprocessortoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: revokepaymentprocessortoken
        description: Envestnet Delete Account Token
        call: account-token-account-token.revokepaymentprocessortoken
        with:
          processorToken: rest.processorToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-token-account-token-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Account Token APIs — Account Token. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: envestnet-create-account-token
      description: Envestnet Create Account Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-token-account-token.generatepaymentprocessortoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-delete-account-token
      description: Envestnet Delete Account Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: account-token-account-token.revokepaymentprocessortoken
      with:
        processorToken: tools.processorToken
      outputParameters:
      - type: object
        mapping: $.
