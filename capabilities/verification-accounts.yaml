naftiko: 1.0.0-alpha2
info:
  label: Envestnet Verification APIs — Accounts
  description: 'Envestnet Verification APIs — Accounts. 4 operations. Lead operation: Envestnet Get Accounts. Self-contained
    Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: verification-accounts
    baseUri: ''
    description: Envestnet Verification APIs — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: getallaccounts
        method: GET
        description: Envestnet Get Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: Comma separated accountIds.
        - name: container
          in: query
          type: string
          description: bank/creditCard/investment/insurance/loan/reward/realEstate/otherAssets/otherLiabilities
        - name: convertToCurrency
          in: query
          type: string
          description: On-demand currency conversion parameter
        - name: include
          in: query
          type: string
          description: profile, holder, fullAccountNumber, fullAccountNumberList, paymentProfile, autoRefresh<br><b>Note:</b><br><li>fullAccountNumber
            is deprecated and is replaced wi
        - name: providerAccountId
          in: query
          type: string
          description: Comma separated providerAccountIds.
        - name: requestId
          in: query
          type: string
          description: The unique identifier that returns contextual data
        - name: status
          in: query
          type: string
          description: ACTIVE,INACTIVE,TO_BE_CLOSED,CLOSED
    - name: accounts-latestBalances
      path: /accounts/latestBalances
      operations:
      - name: getlatestbalances
        method: GET
        description: Envestnet Get Latest Balances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: Comma separated accountIds.
          required: true
        - name: providerAccountId
          in: query
          type: string
          description: providerAccountId.
          required: true
    - name: accounts-accountId
      path: /accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Envestnet Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: integer
          description: accountId
          required: true
        - name: convertToCurrency
          in: query
          type: string
          description: On-demand currency conversion parameter
        - name: include
          in: query
          type: string
          description: profile, holder, fullAccountNumber, fullAccountNumberList, paymentProfile, autoRefresh<br><b>Note:</b>fullAccountNumber
            is deprecated and is replaced with fullA
      - name: deleteaccount
        method: DELETE
        description: Envestnet Delete Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: integer
          description: accountId
          required: true
  exposes:
  - type: rest
    namespace: verification-accounts-rest
    port: 8080
    description: REST adapter for Envestnet Verification APIs — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: getallaccounts
        description: Envestnet Get Accounts
        call: verification-accounts.getallaccounts
        with:
          accountId: rest.accountId
          container: rest.container
          convertToCurrency: rest.convertToCurrency
          include: rest.include
          providerAccountId: rest.providerAccountId
          requestId: rest.requestId
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/latestbalances
      name: accounts-latestbalances
      description: REST surface for accounts-latestBalances.
      operations:
      - method: GET
        name: getlatestbalances
        description: Envestnet Get Latest Balances
        call: verification-accounts.getlatestbalances
        with:
          accountId: rest.accountId
          providerAccountId: rest.providerAccountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}
      name: accounts-accountid
      description: REST surface for accounts-accountId.
      operations:
      - method: GET
        name: getaccount
        description: Envestnet Get Account Details
        call: verification-accounts.getaccount
        with:
          accountId: rest.accountId
          convertToCurrency: rest.convertToCurrency
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaccount
        description: Envestnet Delete Account
        call: verification-accounts.deleteaccount
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: verification-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Verification APIs — Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: envestnet-get-accounts
      description: Envestnet Get Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: verification-accounts.getallaccounts
      with:
        accountId: tools.accountId
        container: tools.container
        convertToCurrency: tools.convertToCurrency
        include: tools.include
        providerAccountId: tools.providerAccountId
        requestId: tools.requestId
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-get-latest-balances
      description: Envestnet Get Latest Balances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: verification-accounts.getlatestbalances
      with:
        accountId: tools.accountId
        providerAccountId: tools.providerAccountId
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-get-account-details
      description: Envestnet Get Account Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: verification-accounts.getaccount
      with:
        accountId: tools.accountId
        convertToCurrency: tools.convertToCurrency
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-delete-account
      description: Envestnet Delete Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: verification-accounts.deleteaccount
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
