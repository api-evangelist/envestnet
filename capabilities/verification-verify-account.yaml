  - type: http
    namespace: verification-verify-account
    baseUri: ''
    description: Envestnet Verification APIs — Verify Account business capability. Self-contained, no shared references.
    resources:
    - name: verifyAccount-providerAccountId
      path: /verifyAccount/{providerAccountId}
      operations:
      - name: initiateaccountverification
        method: POST
        description: Envestnet Verify Accounts Using Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: providerAccountId
          in: path
          type: string
          description: providerAccountId
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
