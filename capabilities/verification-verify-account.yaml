      name: verifyaccount-provideraccountid
      description: REST surface for verifyAccount-providerAccountId.
      operations:
      - method: POST
        name: initiateaccountverification
        description: Envestnet Verify Accounts Using Transactions
        call: verification-verify-account.initiateaccountverification
