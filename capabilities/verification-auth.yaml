naftiko: 1.0.0-alpha2
info:
  label: Envestnet Verification APIs — Auth
  description: 'Envestnet Verification APIs — Auth. 5 operations. Lead operation: Envestnet Get API Keys. Self-contained Naftiko
    capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - Auth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: verification-auth
    baseUri: ''
    description: Envestnet Verification APIs — Auth business capability. Self-contained, no shared references.
    resources:
    - name: auth-apiKey
      path: /auth/apiKey
      operations:
      - name: getapikeys
        method: GET
        description: Envestnet Get API Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: generateapikey
        method: POST
        description: Envestnet Generate API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-apiKey-key
      path: /auth/apiKey/{key}
      operations:
      - name: deleteapikey
        method: DELETE
        description: Envestnet Delete API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          description: key
          required: true
    - name: auth-token
      path: /auth/token
      operations:
      - name: generateaccesstoken
        method: POST
        description: Envestnet Generate Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletetoken
        method: DELETE
        description: Envestnet Delete Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: verification-auth-rest
    port: 8080
    description: REST adapter for Envestnet Verification APIs — Auth. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth/apikey
      name: auth-apikey
      description: REST surface for auth-apiKey.
      operations:
      - method: GET
        name: getapikeys
        description: Envestnet Get API Keys
        call: verification-auth.getapikeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: generateapikey
        description: Envestnet Generate API Key
        call: verification-auth.generateapikey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/apikey/{key}
      name: auth-apikey-key
      description: REST surface for auth-apiKey-key.
      operations:
      - method: DELETE
        name: deleteapikey
        description: Envestnet Delete API Key
        call: verification-auth.deleteapikey
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/token
      name: auth-token
      description: REST surface for auth-token.
      operations:
      - method: POST
        name: generateaccesstoken
        description: Envestnet Generate Access Token
        call: verification-auth.generateaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetoken
        description: Envestnet Delete Token
        call: verification-auth.deletetoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: verification-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Verification APIs — Auth. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: envestnet-get-api-keys
      description: Envestnet Get API Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: verification-auth.getapikeys
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-generate-api-key
      description: Envestnet Generate API Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: verification-auth.generateapikey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-delete-api-key
      description: Envestnet Delete API Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: verification-auth.deleteapikey
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-generate-access-token
      description: Envestnet Generate Access Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: verification-auth.generateaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-delete-token
      description: Envestnet Delete Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: verification-auth.deletetoken
      outputParameters:
      - type: object
        mapping: $.
