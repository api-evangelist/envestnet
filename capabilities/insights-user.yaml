naftiko: 1.0.0-alpha2
info:
  label: Envestnet Insights API Suite — User
  description: 'Envestnet Insights API Suite — User. 7 operations. Lead operation: Envestnet Provides user-level preferences
    for each insight.. Self-contained Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: insights-user
    baseUri: ''
    description: Envestnet Insights API Suite — User business capability. Self-contained, no shared references.
    resources:
    - name: insights-configs-userSubscriptions
      path: /insights/configs/userSubscriptions
      operations:
      - name: getusersubscriptions
        method: GET
        description: Envestnet Provides user-level preferences for each insight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: insightName
          in: query
          type: string
          description: Insight name
        - name: entityId
          in: query
          type: string
          description: Comma separated list of entity Ids it could be a account id or view id
      - name: updateusersubscription
        method: PATCH
        description: Envestnet Update user-level preferences for each insight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteusersubscriptions
        method: DELETE
        description: Envestnet Delete an existing entity-level insight configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: insightName
          in: query
          type: string
          description: Comma separated list of Insight name
          required: true
        - name: entityId
          in: query
          type: string
          description: Comma separated list of entity ids
        - name: entityType
          in: query
          type: string
          description: Comma separated list of entity
    - name: insights-feed
      path: /insights/feed
      operations:
      - name: getuserfeed
        method: GET
        description: Envestnet Fetch all the insights generated for a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: insightName
          in: query
          type: string
          description: Insight name
        - name: fromDate
          in: query
          type: string
          description: fromDate
        - name: toDate
          in: query
          type: string
          description: toDate
        - name: entityId
          in: query
          type: string
          description: Comma separated list of entity Ids, it could be a view Id or account Id
        - name: skip
          in: query
          type: integer
          description: skip (Min 0)
        - name: top
          in: query
          type: integer
          description: top (Max 50)
        - name: entityType
          in: query
          type: string
          description: Comma separated list of entity
        - name: triggerType
          in: query
          type: string
          description: triggerType of an insight defines how an Insight was triggered in the system. <br><br>Currently following
            triggerType are supported - <ul> <li><b>SCHDEULE</b> -
        - name: insightType
          in: query
          type: string
          description: Identifies whether the insight is generated at an entity-level - per account or per view (OTHER), or
            if it considers all entities for the user - e.g. all accoun
    - name: insights-feed-count
      path: /insights/feed/count
      operations:
      - name: getuserfeedcount
        method: GET
        description: Envestnet Fetch the count of generated insight for a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: insightName
          in: query
          type: string
          description: Insight name
        - name: fromDate
          in: query
          type: string
          description: fromDate
        - name: toDate
          in: query
          type: string
          description: toDate
        - name: entityId
          in: query
          type: string
          description: Comma separated list of entity Ids, it could be a view Id or account Id
        - name: entityType
          in: query
          type: string
          description: Comma separated list of entity
        - name: triggerType
          in: query
          type: string
          description: triggerType of an insight defines how an Insight was triggered in the system. <br><br>Currently following
            triggerType are supported - <ul> <li><b>SCHDEULE</b> -
        - name: insightType
          in: query
          type: string
          description: Identifies whether the insight is generated at an entity-level - per account or per view (OTHER), or
            if it considers all entities for the user - e.g. all accoun
    - name: insights-feedExtracts
      path: /insights/feedExtracts
      operations:
      - name: getuserfeedwebhook
        method: GET
        description: Envestnet Fetch all the insights generated for a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: insightName
          in: query
          type: string
          description: Insight name
        - name: fromDate
          in: query
          type: string
          description: fromDate
        - name: toDate
          in: query
          type: string
          description: toDate
        - name: entityId
          in: query
          type: string
          description: Comma separated list of entity Ids, it could be a view Id or account Id
        - name: skip
          in: query
          type: integer
          description: skip (Min 0)
        - name: top
          in: query
          type: integer
          description: top (Max 50)
        - name: entityType
          in: query
          type: string
          description: Comma separated list of entity
        - name: triggerType
          in: query
          type: string
          description: triggerType of an insight defines how an Insight was triggered in the system. <br><br>Currently following
            triggerType are supported - <ul> <li><b>SCHDEULE</b> -
        - name: insightType
          in: query
          type: string
          description: Identifies whether the insight is generated at an entity-level - per account or per view (OTHER), or
            if it considers all entities for the user - e.g. all accoun
        - name: loginName
          in: query
          type: string
          description: Name of the User.
          required: true
    - name: insights-trigger
      path: /insights/trigger
      operations:
      - name: createtrigger
        method: POST
        description: Envestnet Evalute the insights on demand.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: insights-user-rest
    port: 8080
    description: REST adapter for Envestnet Insights API Suite — User. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/insights/configs/usersubscriptions
      name: insights-configs-usersubscriptions
      description: REST surface for insights-configs-userSubscriptions.
      operations:
      - method: GET
        name: getusersubscriptions
        description: Envestnet Provides user-level preferences for each insight.
        call: insights-user.getusersubscriptions
        with:
          insightName: rest.insightName
          entityId: rest.entityId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateusersubscription
        description: Envestnet Update user-level preferences for each insight.
        call: insights-user.updateusersubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteusersubscriptions
        description: Envestnet Delete an existing entity-level insight configuration
        call: insights-user.deleteusersubscriptions
        with:
          insightName: rest.insightName
          entityId: rest.entityId
          entityType: rest.entityType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insights/feed
      name: insights-feed
      description: REST surface for insights-feed.
      operations:
      - method: GET
        name: getuserfeed
        description: Envestnet Fetch all the insights generated for a user.
        call: insights-user.getuserfeed
        with:
          insightName: rest.insightName
          fromDate: rest.fromDate
          toDate: rest.toDate
          entityId: rest.entityId
          skip: rest.skip
          top: rest.top
          entityType: rest.entityType
          triggerType: rest.triggerType
          insightType: rest.insightType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insights/feed/count
      name: insights-feed-count
      description: REST surface for insights-feed-count.
      operations:
      - method: GET
        name: getuserfeedcount
        description: Envestnet Fetch the count of generated insight for a user.
        call: insights-user.getuserfeedcount
        with:
          insightName: rest.insightName
          fromDate: rest.fromDate
          toDate: rest.toDate
          entityId: rest.entityId
          entityType: rest.entityType
          triggerType: rest.triggerType
          insightType: rest.insightType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insights/feedextracts
      name: insights-feedextracts
      description: REST surface for insights-feedExtracts.
      operations:
      - method: GET
        name: getuserfeedwebhook
        description: Envestnet Fetch all the insights generated for a user.
        call: insights-user.getuserfeedwebhook
        with:
          insightName: rest.insightName
          fromDate: rest.fromDate
          toDate: rest.toDate
          entityId: rest.entityId
          skip: rest.skip
          top: rest.top
          entityType: rest.entityType
          triggerType: rest.triggerType
          insightType: rest.insightType
          loginName: rest.loginName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insights/trigger
      name: insights-trigger
      description: REST surface for insights-trigger.
      operations:
      - method: POST
        name: createtrigger
        description: Envestnet Evalute the insights on demand.
        call: insights-user.createtrigger
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: insights-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Insights API Suite — User. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: envestnet-provides-user-level-preferences
      description: Envestnet Provides user-level preferences for each insight.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insights-user.getusersubscriptions
      with:
        insightName: tools.insightName
        entityId: tools.entityId
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-update-user-level-preferences
      description: Envestnet Update user-level preferences for each insight.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: insights-user.updateusersubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-delete-existing-entity-level
      description: Envestnet Delete an existing entity-level insight configuration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: insights-user.deleteusersubscriptions
      with:
        insightName: tools.insightName
        entityId: tools.entityId
        entityType: tools.entityType
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-fetch-all-insights-generated
      description: Envestnet Fetch all the insights generated for a user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insights-user.getuserfeed
      with:
        insightName: tools.insightName
        fromDate: tools.fromDate
        toDate: tools.toDate
        entityId: tools.entityId
        skip: tools.skip
        top: tools.top
        entityType: tools.entityType
        triggerType: tools.triggerType
        insightType: tools.insightType
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-fetch-count-generated-insight
      description: Envestnet Fetch the count of generated insight for a user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insights-user.getuserfeedcount
      with:
        insightName: tools.insightName
        fromDate: tools.fromDate
        toDate: tools.toDate
        entityId: tools.entityId
        entityType: tools.entityType
        triggerType: tools.triggerType
        insightType: tools.insightType
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-fetch-all-insights-generated-2
      description: Envestnet Fetch all the insights generated for a user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insights-user.getuserfeedwebhook
      with:
        insightName: tools.insightName
        fromDate: tools.fromDate
        toDate: tools.toDate
        entityId: tools.entityId
        skip: tools.skip
        top: tools.top
        entityType: tools.entityType
        triggerType: tools.triggerType
        insightType: tools.insightType
        loginName: tools.loginName
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-evalute-insights-demand
      description: Envestnet Evalute the insights on demand.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: insights-user.createtrigger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
