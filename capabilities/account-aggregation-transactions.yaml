naftiko: 1.0.0-alpha2
info:
  label: Envestnet Aggregation APIs — Transactions
  description: 'Envestnet Aggregation APIs — Transactions. 13 operations. Lead operation: Envestnet Get Transactions. Self-contained
    Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
