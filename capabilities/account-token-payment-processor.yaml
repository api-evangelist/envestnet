naftiko: 1.0.0-alpha2
info:
  label: Envestnet Account Token APIs — Payment Processor
  description: 'Envestnet Account Token APIs — Payment Processor. 3 operations. Lead operation: Envestnet Get Account Details.
    Self-contained Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - Payment Processor
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-token-payment-processor
    baseUri: ''
    description: Envestnet Account Token APIs — Payment Processor business capability. Self-contained, no shared references.
    resources:
    - name: partner-paymentProcessor-account
      path: /partner/paymentProcessor/account
      operations:
      - name: getverifiedaccount
        method: GET
        description: Envestnet Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: processorToken
          in: header
          type: string
          description: Token shared by customer to access financial account information.
          required: true
    - name: partner-paymentProcessor-account-balance
      path: /partner/paymentProcessor/account/balance
      operations:
      - name: getverifiedaccountbalance
        method: GET
        description: Envestnet Get Account Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: processorToken
          in: header
          type: string
          description: Token shared by customer to access financial account information.
          required: true
    - name: partner-paymentProcessor-account-holder
      path: /partner/paymentProcessor/account/holder
      operations:
      - name: getverifiedaccountholder
        method: GET
        description: Envestnet Get Account Holder Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: processorToken
          in: header
          type: string
          description: Token shared by customer to access financial account information.
          required: true
  exposes:
  - type: rest
    namespace: account-token-payment-processor-rest
    port: 8080
    description: REST adapter for Envestnet Account Token APIs — Payment Processor. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/partner/paymentprocessor/account
      name: partner-paymentprocessor-account
      description: REST surface for partner-paymentProcessor-account.
      operations:
      - method: GET
        name: getverifiedaccount
        description: Envestnet Get Account Details
        call: account-token-payment-processor.getverifiedaccount
        with:
          processorToken: rest.processorToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/partner/paymentprocessor/account/balance
      name: partner-paymentprocessor-account-balance
      description: REST surface for partner-paymentProcessor-account-balance.
      operations:
      - method: GET
        name: getverifiedaccountbalance
        description: Envestnet Get Account Balance
        call: account-token-payment-processor.getverifiedaccountbalance
        with:
          processorToken: rest.processorToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/partner/paymentprocessor/account/holder
      name: partner-paymentprocessor-account-holder
      description: REST surface for partner-paymentProcessor-account-holder.
      operations:
      - method: GET
        name: getverifiedaccountholder
        description: Envestnet Get Account Holder Details
        call: account-token-payment-processor.getverifiedaccountholder
        with:
          processorToken: rest.processorToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-token-payment-processor-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Account Token APIs — Payment Processor. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: envestnet-get-account-details
      description: Envestnet Get Account Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-token-payment-processor.getverifiedaccount
      with:
        processorToken: tools.processorToken
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-get-account-balance
      description: Envestnet Get Account Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-token-payment-processor.getverifiedaccountbalance
      with:
        processorToken: tools.processorToken
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-get-account-holder-details
      description: Envestnet Get Account Holder Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-token-payment-processor.getverifiedaccountholder
      with:
        processorToken: tools.processorToken
      outputParameters:
      - type: object
        mapping: $.
