naftiko: 1.0.0-alpha2
info:
  label: Envestnet Aggregation APIs — DataExtracts
  description: 'Envestnet Aggregation APIs — DataExtracts. 2 operations. Lead operation: Envestnet Get Events. Self-contained
    Naftiko capability covering one Envestnet business surface.'
  tags:
  - Envestnet
  - DataExtracts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVESTNET_API_KEY: ENVESTNET_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-aggregation-dataextracts
    baseUri: ''
    description: Envestnet Aggregation APIs — DataExtracts business capability. Self-contained, no shared references.
    resources:
    - name: dataExtracts-events
      path: /dataExtracts/events
      operations:
      - name: getdataextractsevents
        method: GET
        description: Envestnet Get Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventName
          in: query
          type: string
          description: Event Name
          required: true
        - name: fromDate
          in: query
          type: string
          description: From DateTime (YYYY-MM-DDThh:mm:ssZ)
          required: true
        - name: toDate
          in: query
          type: string
          description: To DateTime (YYYY-MM-DDThh:mm:ssZ)
          required: true
    - name: dataExtracts-userData
      path: /dataExtracts/userData
      operations:
      - name: getdataextractsuserdata
        method: GET
        description: Envestnet Get userData
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDate
          in: query
          type: string
          description: From DateTime (YYYY-MM-DDThh:mm:ssZ)
          required: true
        - name: loginName
          in: query
          type: string
          description: Login Name
          required: true
        - name: toDate
          in: query
          type: string
          description: To DateTime (YYYY-MM-DDThh:mm:ssZ)
          required: true
  exposes:
  - type: rest
    namespace: account-aggregation-dataextracts-rest
    port: 8080
    description: REST adapter for Envestnet Aggregation APIs — DataExtracts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/dataextracts/events
      name: dataextracts-events
      description: REST surface for dataExtracts-events.
      operations:
      - method: GET
        name: getdataextractsevents
        description: Envestnet Get Events
        call: account-aggregation-dataextracts.getdataextractsevents
        with:
          eventName: rest.eventName
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dataextracts/userdata
      name: dataextracts-userdata
      description: REST surface for dataExtracts-userData.
      operations:
      - method: GET
        name: getdataextractsuserdata
        description: Envestnet Get userData
        call: account-aggregation-dataextracts.getdataextractsuserdata
        with:
          fromDate: rest.fromDate
          loginName: rest.loginName
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-aggregation-dataextracts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envestnet Aggregation APIs — DataExtracts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: envestnet-get-events
      description: Envestnet Get Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-aggregation-dataextracts.getdataextractsevents
      with:
        eventName: tools.eventName
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: envestnet-get-userdata
      description: Envestnet Get userData
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-aggregation-dataextracts.getdataextractsuserdata
      with:
        fromDate: tools.fromDate
        loginName: tools.loginName
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
