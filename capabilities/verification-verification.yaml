    resources:
    - name: verification
      path: /verification
      operations:
      - name: getverificationstatus
        method: GET
        description: Envestnet Get Verification Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: Comma separated accountId
        - name: providerAccountId
          in: query
          type: string
          description: Comma separated providerAccountId
        - name: verificationType
          in: query
          type: string
          description: verificationType
      - name: verifychallengedeposit
        method: PUT
        description: Envestnet Verify Challenge Deposit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: initiatematchingorchallengedepositeverification
        method: POST
        description: Envestnet Initiaite Challenge Deposit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
