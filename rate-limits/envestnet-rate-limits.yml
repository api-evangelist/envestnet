specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Envestnet
providerId: envestnet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial
  - Open Banking
  - Account Aggregation
  - Rate Limiting
description: Envestnet | Yodlee does not publish numeric rate limits on its public developer portal. Sandbox
  access has light operational limits, and production limits are agreed in the customer contract. Rate
  limiting is enforced at the Yodlee gateway and signaled with HTTP 429 on exceedance.
notes: No public rate-limit numbers were located on developer.envestnet.com as of 2026-05-05. Production
  limits are part of the customer agreement; sandbox is throttled but the threshold is not published.
sources:
  - https://developer.envestnet.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Sandbox Limit
    scope: sandbox
    metric: varies
    limit: see developer.envestnet.com (not published)
    notes: Sandbox is throttled to discourage load testing; numeric threshold is not published.
  - name: Production Customer Limit
    scope: contract
    metric: varies
    limit: see customer agreement
    notes: Production limits are negotiated as part of the Envestnet | Yodlee subscription.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor the Retry-After header
      when present on 429 responses.
  - name: Per-User / Per-Account Scoping
    description: For account-aggregation flows, refresh cadence is bounded by source institution policy
      and Yodlee's data-source-specific scheduling, in addition to gateway rate limits.
  - name: Contractual Scoping
    description: Production rate limits and concurrency are set in the customer agreement, not in public
      docs.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
